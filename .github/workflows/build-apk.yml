name: Build Android APK

on:
  workflow_dispatch:    # botão "Run workflow" manual no GitHub
  push:
    branches: [ main ]
    paths:
      - 'Frontend_App/dashboard/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend_App/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Capacitor 8 requer Node >=22
          cache: 'npm'
          cache-dependency-path: Frontend_App/dashboard/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app for Android (Vite + copy to dist/)
        run: npm run build:android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: Frontend_App/dashboard/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/gradle.log
        continue-on-error: true

      - name: Upload Gradle log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: casais-fleet-debug-apk
          path: Frontend_App/dashboard/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Fail if APK build failed
        if: always()
        run: |
          if [ ! -f Frontend_App/dashboard/android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK build failed — see gradle-build-log artifact"
            exit 1
          fi
