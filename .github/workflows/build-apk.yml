name: Build Android APK

on:
  workflow_dispatch:    # botão "Run workflow" manual no GitHub
  push:
    branches: [ main ]
    paths:
      - 'Frontend_App/dashboard/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend_App/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend_App/dashboard/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app for Android (Vite + copy to dist/)
        run: npm run build:android

      - name: Debug pre-sync state
        if: always()
        run: |
          set +e
          echo "=== pwd ==="
          pwd
          echo "=== ls dashboard ==="
          ls -la
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json 2>/dev/null || echo "NOT FOUND"
          echo "=== dist/ exists? ==="
          if [ -d dist ]; then echo "YES"; ls -la dist/ | head -20; else echo "NO — dist/ missing"; fi
          echo "=== Backend_Cloud/public exists? ==="
          if [ -d ../../Backend_Cloud/public ]; then echo "YES"; ls ../../Backend_Cloud/public/ | head -10; else echo "NO"; fi
          echo "=== android/ exists? ==="
          test -d android && echo YES || echo NO
          echo "=== capacitor version ==="
          npx cap --version 2>&1 || true
          echo "=== package.json build:android script ==="
          node -e "console.log(require('./package.json').scripts['build:android'])" 2>&1 || true

      - name: Sync Capacitor
        id: capsync
        run: |
          set +e
          mkdir -p /tmp/ci-logs
          {
            echo "=== pwd ==="
            pwd
            echo "=== dist/ exists? ==="
            ls -la dist/ 2>&1 | head -20 || echo "NO DIST"
            echo "=== capacitor.config.json ==="
            cat capacitor.config.json || true
            echo "=== Running cap sync... ==="
            npx cap sync android --verbose 2>&1
            echo "=== Exit code: $? ==="
          } | tee /tmp/ci-logs/cap-sync.log
          # Always upload, success or fail
          exit ${PIPESTATUS[0]}

      - name: Upload sync logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cap-sync-debug-log
          path: /tmp/ci-logs/cap-sync.log
          if-no-files-found: warn

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: Frontend_App/dashboard/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: casais-fleet-debug-apk
          path: Frontend_App/dashboard/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
